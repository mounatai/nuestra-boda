<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Danke · Mouna & Johannes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --gold: #926949;
      --blue: #00357a;
      --card: rgba(255, 255, 255, 0.62);
      --border: rgba(0, 0, 0, 0.12);
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      --radius: 16px;

      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(18px + var(--safe-top)) calc(16px + var(--safe-right)) calc(22px + var(--safe-bottom)) calc(16px + var(--safe-left));
      font-family: 'Montserrat', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--blue);

      background:
        radial-gradient(1200px 650px at 50% 0%, rgba(255, 255, 255, 0.40), rgba(255, 255, 255, 0.00) 60%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.18)),
        url("fondo.jpg");
      background-size: cover;
      background-position: center;
    }

    .card {
      width: min(620px, 94vw);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px 18px;
      text-align: center;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      color: var(--gold);
      font-size: 22px;
      letter-spacing: 0.06em;
      margin: 0 0 10px;
    }

    p {
      margin: 0;
      font-size: 15px;
      line-height: 1.7;
      color: rgba(0, 53, 122, 0.92);
    }

    /* fU.jpg image (show FULL image, no crop) */
    .thanks-img {
      margin: 16px auto 6px;
      width: min(520px, 100%);
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(0, 0, 0, 0.10);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.08);
      background: rgba(255, 255, 255, 0.35);
    }

    .thanks-img img {
      width: 100%;
      height: auto;
      /* CHANGED: let height adapt */
      max-height: 360px;
      /* prevents it becoming too tall */
      object-fit: contain;
      /* CHANGED: show entire photo */
      display: block;
      background: transparent;
    }

    @media (max-width: 520px) {
      .thanks-img img {
        max-height: 320px;
      }
    }

    a {
      display: inline-block;
      margin-top: 14px;
      color: var(--gold);
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 12px;
      border-bottom: 1px solid rgba(146, 105, 73, 0.45);
      padding-bottom: 2px;
    }

    a:hover {
      border-bottom-color: rgba(146, 105, 73, 0.9);
    }
  </style>
</head>

<body>
  <main class="card" role="main" aria-label="Danke Seite">
    <h1>Danke!</h1>
    <p>
      Danke, dass du uns Bescheid gegeben hast. Wir verstehen das natürlich total
      und freuen uns, dich bald wiederzusehen.
    </p>

    <a href="index.html">Zurück</a>
  </main>
</body>

</html>
