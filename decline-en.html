<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sorry · RSVP</title>

  <style>
    :root {
      --gold: #926949;
      --blue: #00357a;
      --card: rgba(255, 255, 255, 0.55);
      --border: rgba(0, 0, 0, 0.12);
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      --radius: 16px;

      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--blue);
      line-height: 1.6;
      background:
        radial-gradient(1200px 650px at 50% 0%, rgba(255, 255, 255, 0.40), rgba(255, 255, 255, 0.00) 60%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.18)),
        url("fondo.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    @media (max-width:900px) {
      body {
        background-attachment: scroll;
      }
    }

    .wrap {
      max-width: 780px;
      margin: 0 auto;
      padding: calc(18px + var(--safe-top)) calc(16px + var(--safe-right)) calc(28px + var(--safe-bottom)) calc(16px + var(--safe-left));
      text-align: center;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px 16px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      text-align: left;
    }

    h1 {
      margin: 0 0 8px;
      font-family: Georgia, "Times New Roman", Times, serif;
      color: var(--gold);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 18px;
      text-align: center;
    }

    p {
      margin: 0 0 14px;
      color: rgba(0, 53, 122, 0.82);
      text-align: center;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 10px;
    }

    label {
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: rgba(0, 53, 122, 0.85);
      font-weight: 600;
    }

    input {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(0, 0, 0, 0.12);
      padding: 11px 12px;
      background: rgba(255, 255, 255, 0.65);
      color: rgba(0, 53, 122, 0.95);
      outline: none;
      font: inherit;
      line-height: 1.3;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 11px 16px;
      border-radius: 999px;
      border: 1px solid rgba(146, 105, 73, 0.70);
      background: rgba(255, 255, 255, 0.18);
      color: var(--gold);
      text-decoration: none;
      letter-spacing: 0.02em;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn.primary {
      background: rgba(146, 105, 73, 0.12);
      border-color: rgba(146, 105, 73, 0.80);
    }

    .btn:hover {
      background: rgba(146, 105, 73, 0.16);
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .hint {
      margin-top: 10px;
      color: rgba(0, 53, 122, 0.65);
      font-size: 12px;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="card" aria-label="Decline form">
      <h1>Sorry!</h1>
      <p>We’re sad you can’t make it. Thanks for letting us know.</p>

      <form id="declineForm" method="POST"
        action="https://script.google.com/macros/s/AKfycbwK6S9Os9V6Qwcnx9j58YM2-HfwbwQ1Lk53IXBbLglVhE6SflS4ESsRX8JBblsl57ak/exec">
        <input type="hidden" name="kind" value="decline">
        <input type="hidden" name="language" value="en">
        <input type="hidden" name="source" value="wedding-site">

        <div class="field">
          <label for="fullName">First &amp; last name *</label>
          <input id="fullName" name="fullName" type="text" autocomplete="name" required />
        </div>

        <div class="field">
          <label for="email">Email address (optional)</label>
          <input id="email" name="email" type="email" autocomplete="email" />
        </div>

        <div class="actions">
          <a class="btn" href="index-en.html">Back</a>
          <button class="btn primary" type="submit">Submit</button>
        </div>

        <div class="hint">
          We’ll only use your details for planning.
        </div>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById('declineForm');
    const submitBtn = form.querySelector('button[type="submit"]');

    let isSubmitting = false;

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (isSubmitting) return;
      isSubmitting = true;

      submitBtn.disabled = true;
      const originalText = submitBtn.textContent;
      submitBtn.textContent = 'Sending…';

      try {
        const fd = new FormData(form);
        const res = await fetch(form.action, { method: 'POST', body: fd });
        if (!res.ok) throw new Error('Network response was not ok');

        window.location.href = 'rsvp-thanks-en.html';
      } catch (err) {
        console.error(err);
        alert('Oops! The form could not be sent. Please try again later.');

        isSubmitting = false;
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      }
    });
  </script>
</body>

</html>
