<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>RSVP · Mouna & Johannes</title>

  <style>
    :root {
      --gold: #926949;
      --blue: #00357a;
      --card: rgba(255, 255, 255, 0.55);
      --border: rgba(0, 0, 0, 0.12);
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      --radius: 16px;

      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--blue);
      line-height: 1.6;
      background:
        radial-gradient(1200px 650px at 50% 0%, rgba(255, 255, 255, 0.40), rgba(255, 255, 255, 0.00) 60%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.18)),
        url("fondo.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    @media (max-width:900px) {
      body {
        background-attachment: scroll;
      }
    }

    .wrap {
      max-width: 780px;
      margin: 0 auto;
      padding: calc(18px + var(--safe-top)) calc(16px + var(--safe-right)) calc(28px + var(--safe-bottom)) calc(16px + var(--safe-left));
    }

    .lang-switch {
      position: fixed;
      top: calc(12px + var(--safe-top));
      right: calc(12px + var(--safe-right));
      z-index: 50;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .lang-switch a {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      color: rgba(0, 53, 122, 0.85);
      border: 1px solid rgba(146, 105, 73, 0.45);
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.20);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .lang-switch a[aria-current="page"] {
      color: rgba(146, 105, 73, 0.98);
      border-color: rgba(146, 105, 73, 0.75);
      background: rgba(146, 105, 73, 0.08);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 16px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    h1 {
      margin: 0 0 6px;
      font-family: Georgia, "Times New Roman", Times, serif;
      color: var(--gold);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 18px;
      text-align: center;
    }

    .sub {
      margin: 0 0 14px;
      color: rgba(0, 53, 122, 0.78);
      font-size: 13px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 680px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: rgba(0, 53, 122, 0.85);
      font-weight: 600;
    }

    input[type="text"],
    input[type="email"],
    select,
    textarea {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(0, 0, 0, 0.12);
      padding: 11px 12px;
      background: rgba(255, 255, 255, 0.65);
      color: rgba(0, 53, 122, 0.95);
      outline: none;
      font: inherit;
      line-height: 1.3;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .choices {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      padding: 4px 0 2px;
    }

    .choice {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(146, 105, 73, 0.45);
      background: rgba(255, 255, 255, 0.18);
    }

    .choice input {
      accent-color: var(--gold);
    }

    .full {
      grid-column: 1 / -1;
    }

    .hint {
      margin: 10px 2px 0;
      color: rgba(0, 53, 122, 0.68);
      font-size: 12px;
      line-height: 1.5;
      text-align: center;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 11px 16px;
      border-radius: 999px;
      border: 1px solid rgba(146, 105, 73, 0.70);
      background: rgba(255, 255, 255, 0.18);
      color: var(--gold);
      letter-spacing: 0.02em;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .btn.primary {
      background: rgba(146, 105, 73, 0.12);
      border-color: rgba(146, 105, 73, 0.80);
    }

    .btn:hover {
      background: rgba(146, 105, 73, 0.16);
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .is-hidden {
      display: none !important;
    }

    /* NEW: checkbox row */
    .check-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(146, 105, 73, 0.35);
      background: rgba(255, 255, 255, 0.18);
    }

    .check-row input[type="checkbox"] {
      margin-top: 2px;
      accent-color: var(--gold);
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    .check-row .check-text {
      margin: 0;
      font-size: 12.5px;
      line-height: 1.45;
      color: rgba(0, 53, 122, 0.86);
      letter-spacing: 0.01em;
      text-transform: none;
      font-weight: 500;
    }
  </style>
</head>

<body>
  <nav class="lang-switch" aria-label="Language switch">
    <a href="rsvp.html">DE</a>
    <a href="rsvp-en.html">EN</a>
    <a href="rsvp-es.html" aria-current="page">ES</a>
  </nav>

  <main class="wrap">
    <section class="card" aria-label="RSVP form">
      <h1>RSVP</h1>
      <p class="sub">Por favor confirma tu asistencia antes del <strong>01/05/2026</strong>.</p>

      <form id="rsvpForm" method="POST"
        action="https://script.google.com/macros/s/AKfycbwK6S9Os9V6Qwcnx9j58YM2-HfwbwQ1Lk53IXBbLglVhE6SflS4ESsRX8JBblsl57ak/exec">
        <input type="hidden" name="kind" value="rsvp">
        <input type="hidden" name="language" value="es">
        <input type="hidden" name="source" value="wedding-site">

        <div class="grid">
          <div class="field full">
            <label for="email">Correo electrónico *</label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>

          <div class="field full">
            <label for="fullName">Nombre y apellidos *</label>
            <input id="fullName" name="fullName" type="text" autocomplete="name" required />
          </div>

          <div class="field full">
            <label>¿Vas a asistir?</label>
            <div class="choices" role="radiogroup" aria-label="Will you attend">
              <label class="choice">
                <input type="radio" name="attend" value="yes" checked />
                <span>Sí</span>
              </label>
            </div>
          </div>

          <!-- NEW: email permission checkbox -->
          <div class="field full">
            <label for="emailUpdates">Actualizaciones por correo</label>
            <label class="check-row" for="emailUpdates">
              <input id="emailUpdates" type="checkbox" name="emailUpdates" value="yes" />
              <span class="check-text">
                Sí, podéis enviarme un correo cuando tengáis el plan del día y otros detalles de la boda.
              </span>
            </label>
          </div>

          <div class="field">
            <label>¿Vienes con acompañante (+1)?</label>
            <div class="choices" role="radiogroup" aria-label="Plus one">
              <label class="choice">
                <input type="radio" name="plusOne" value="yes" />
                <span>Sí</span>
              </label>
              <label class="choice">
                <input type="radio" name="plusOne" value="no" />
                <span>No</span>
              </label>
            </div>
          </div>

          <div class="field">
            <label>¿Niños?</label>
            <div class="choices" role="radiogroup" aria-label="Children">
              <label class="choice">
                <input type="radio" name="children" value="yes" />
                <span>Sí</span>
              </label>
              <label class="choice">
                <input type="radio" name="children" value="no" />
                <span>No</span>
              </label>
            </div>
          </div>

          <div class="field full is-hidden" id="childrenCountField">
            <label for="childrenCount">Si sí: ¿cuántos?</label>
            <select id="childrenCount" name="childrenCount">
              <option value="">Elige…</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
            </select>
          </div>

          <div class="field full">
            <label>¿Dieta / intolerancias?</label>
            <div class="choices" role="group" aria-label="Dietary restrictions">
              <label class="choice">
                <input type="checkbox" name="dietary[]" value="Vegan">
                <span>Vegana</span>
              </label>
              <label class="choice">
                <input type="checkbox" name="dietary[]" value="Vegetarian">
                <span>Vegetariana</span>
              </label>
              <label class="choice">
                <input type="checkbox" name="dietary[]" value="Gluten-free">
                <span>Sin gluten</span>
              </label>
              <label class="choice">
                <input type="checkbox" name="dietary[]" value="No dietary restrictions">
                <span>Sin restricciones</span>
              </label>
              <label class="choice">
                <input type="checkbox" name="dietary[]" value="Other">
                <span>Otro</span>
              </label>
            </div>
          </div>

          <div class="field full">
            <label for="dietOther">Si es “Otro”, indícalo (opcional)</label>
            <textarea id="dietOther" name="dietOther" placeholder="por ejemplo: alergias, detalles…"></textarea>
          </div>

          <div class="field full">
            <label for="danceSong">Si hubiera una canción que te haga ir directo a la pista… ¿cuál sería?</label>
            <input id="danceSong" name="danceSong" type="text" maxlength="30" placeholder="Máx. 30 caracteres" />
          </div>
        </div>

        <p class="hint">
          * Obligatorio. Usaremos tus datos solo para la organización.
        </p>

        <div class="actions">
          <a class="btn" href="index-es.html">Volver</a>
          <button class="btn primary" type="submit">Enviar</button>
        </div>
      </form>
    </section>
  </main>

  <script>
    // children count show/hide
    const childrenRadios = document.querySelectorAll('input[name="children"]');
    const childrenCountField = document.getElementById('childrenCountField');
    const childrenCountSelect = document.getElementById('childrenCount');

    function updateChildrenCountVisibility() {
      const selected = document.querySelector('input[name="children"]:checked')?.value;
      const show = selected === 'yes';
      childrenCountField.classList.toggle('is-hidden', !show);
      childrenCountSelect.required = show;
      if (!show) childrenCountSelect.value = "";
    }
    childrenRadios.forEach(r => r.addEventListener('change', updateChildrenCountVisibility));
    updateChildrenCountVisibility();

    // robust single-submit with fetch + disabled button
    const form = document.getElementById('rsvpForm');
    const submitBtn = form.querySelector('button[type="submit"]');
    let isSubmitting = false;

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (isSubmitting) return;
      isSubmitting = true;

      submitBtn.disabled = true;
      const originalText = submitBtn.textContent;
      submitBtn.textContent = 'Enviando…';

      try {
        const fd = new FormData(form);
        const res = await fetch(form.action, { method: 'POST', body: fd });
        if (!res.ok) throw new Error('Network response was not ok');

        window.location.href = 'rsvp-thanks-es.html';
      } catch (err) {
        console.error(err);
        alert('¡Ups! No se pudo enviar el formulario. Por favor, inténtalo más tarde.');

        isSubmitting = false;
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      }
    });
  </script>
</body>

</html>
