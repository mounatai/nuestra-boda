<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Gracias · RSVP</title>
    <style>
        :root {
            --gold: #926949;
            --blue: #00357a;
            --card: rgba(255, 255, 255, 0.55);
            --border: rgba(0, 0, 0, 0.12);
            --shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            color: var(--blue);
            line-height: 1.6;
            background: radial-gradient(1200px 650px at 50% 0%, rgba(255, 255, 255, .40), rgba(255, 255, 255, 0) 60%), linear-gradient(180deg, rgba(255, 255, 255, .18), rgba(255, 255, 255, .18)), url("fondo.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed
        }

        @media (max-width:900px) {
            body {
                background-attachment: scroll
            }
        }

        .wrap {
            max-width: 780px;
            margin: 0 auto;
            padding: calc(18px + var(--safe-top)) calc(16px + var(--safe-right)) calc(28px + var(--safe-bottom)) calc(16px + var(--safe-left));
            text-align: center
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 22px 16px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px)
        }

        h1 {
            margin: 0 0 10px;
            font-family: Georgia, "Times New Roman", Times, serif;
            color: var(--gold);
            letter-spacing: .04em;
            text-transform: uppercase;
            font-size: 18px
        }

        p {
            margin: 0 0 16px;
            color: rgba(0, 53, 122, .85)
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 11px 16px;
            border-radius: 999px;
            border: 1px solid rgba(146, 105, 73, .70);
            background: rgba(146, 105, 73, .12);
            color: var(--gold);
            text-decoration: none;
            letter-spacing: .02em;
            font-weight: 600;
            font-size: 12px
        }

        .btn:hover {
            background: rgba(146, 105, 73, .16);
            transform: translateY(-1px)
        }
    </style>
</head>

<body>
    <main class="wrap">
        <section class="card" aria-label="Thanks">
            <h1>¡Gracias!</h1>
            <p>Gracias por tu respuesta — la hemos recibido.</p>
            <p>Si algo cambia, escríbenos cuando quieras.</p>
            <a class="btn" href="index-es.html">Volver a la página principal</a>
        </section>
    </main>
</body>

</html>
